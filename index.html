<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Frohe Ostern</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;1,400&family=Dancing+Script:wght@700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #0f2b24; /* Noch tieferes Dunkelgrün für mehr Eleganz */
            --text-color: #ffffff;
            --egg-pink: #ff9dd3;
            --egg-blue: #a8dadc;
            --egg-yellow: #f4d35e;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            font-family: 'Playfair Display', serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            position: relative;
        }

        /* --- Animierter Text --- */
        .content {
            position: relative;
            z-index: 20;
            text-align: center;
            padding: 20px;
            pointer-events: none; /* Man kann durch den Text auf die Eier "klicken" */
        }

        h1 {
            font-family: 'Dancing Script', cursive;
            font-size: 5rem;
            margin-bottom: 10px;
            text-shadow: 0 4px 15px rgba(0,0,0,0.5);
            opacity: 0;
            animation: fadeIn 1.5s ease-out forwards;
        }

        p {
            font-size: 1.4rem;
            font-style: italic;
            opacity: 0;
            animation: fadeIn 1.5s ease-out 0.8s forwards;
            line-height: 1.4;
        }

        /* --- Der zentrierte Hase --- */
        .bunny-container {
            position: absolute;
            width: 100%;
            height: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 5;
        }

        .easter-bunny-svg {
            width: 80vh; /* Passt sich der Höhe an, perfekt für iPads */
            max-width: 90vw;
            height: auto;
            opacity: 0.4; /* Dezent im Hintergrund */
            transform: translateY(10%);
        }

        /* Ohren-Wackeln */
        #rightEar, #leftEar {
            animation: wiggle 3s ease-in-out infinite;
            transform-origin: center;
        }

        @keyframes wiggle {
            0%, 100% { transform: rotate(0deg); }
            50% { transform: rotate(5deg) translateY(-10px); }
        }

        /* --- Ostereier mit Mustern --- */
        .egg {
            position: absolute;
            width: 60px;
            height: 85px;
            border-radius: 50% 50% 50% 50% / 60% 60% 40% 40%;
            z-index: 10;
            box-shadow: inset -10px -10px 15px rgba(0,0,0,0.2), 0 10px 20px rgba(0,0,0,0.3);
            animation: float 5s ease-in-out infinite;
        }

        /* Ei 1: Gestreift */
        .egg-striped {
            background: linear-gradient(var(--egg-pink) 20%, transparent 20%, transparent 40%, var(--egg-pink) 40%, var(--egg-pink) 60%, transparent 60%, transparent 80%, var(--egg-pink) 80%);
            background-color: #fff;
            top: 15%; left: 15%;
            animation-delay: 0s;
        }

        /* Ei 2: Zacken (Zick-Zack via Gradient) */
        .egg-zigzag {
            background: 
                linear-gradient(135deg, var(--egg-blue) 25%, transparent 25%),
                linear-gradient(225deg, var(--egg-blue) 25%, transparent 25%),
                linear-gradient(45deg, var(--egg-blue) 25%, transparent 25%),
                linear-gradient(315deg, var(--egg-blue) 25%, #fff 25%);
            background-position: 10px 0, 10px 0, 0 0, 0 0;
            background-size: 20px 20px;
            background-repeat: repeat;
            top: 70%; left: 20%;
            animation-delay: 1s;
        }

        /* Ei 3: Punkte */
        .egg-dots {
            background-color: var(--egg-yellow);
            background-image: radial-gradient(#fff 20%, transparent 20%);
            background-size: 15px 15px;
            top: 20%; right: 20%;
            animation-delay: 2s;
        }

        @keyframes float {
            0%, 100% { transform: translateY(0) rotate(0deg); }
            50% { transform: translateY(-25px) rotate(10deg); }
        }

        @keyframes fadeIn {
            to { opacity: 1; transform: translateY(0); }
        }

        /* --- iPhone & iPad Optimierung --- */
        @media (max-width: 768px) {
            h1 { font-size: 3rem; }
            p { font-size: 1.1rem; }
            .easter-bunny-svg { width: 60vh; }
            .egg { width: 45px; height: 60px; }
        }

        @media (max-width: 480px) {
            h1 { font-size: 2.5rem; }
            .easter-bunny-svg { width: 50vh; transform: translateY(15%); }
        }
    </style>
</head>
<body>

    <div class="egg egg-striped"></div>
    <div class="egg egg-zigzag"></div>
    <div class="egg egg-dots"></div>

    <div class="bunny-container">
        <svg class="easter-bunny-svg" viewBox="0 0 728 914" fill="none" xmlns="http://www.w3.org/2000/svg">
            <g id="in-drawing">
                <g id="leftEar">
                    <path d="M128.977 175.833C161.935 151.115 208.536 157.998 233.067 191.206C311.87 297.883 301.251 409.044 301.251 409.044C301.251 409.044 192.523 387.391 113.72 280.714C89.1897 247.506 96.0204 200.549 128.977 175.833Z" fill="#FF9DD3" />
                </g>
                <g id="rightEar">
                    <path d="M598.022 175.833C565.065 151.115 518.464 157.998 493.933 191.206C415.13 297.883 425.749 409.044 425.749 409.044C425.749 409.044 534.476 387.391 613.279 280.714C637.81 247.506 630.98 200.549 598.022 175.833Z" fill="#FF9DD3" />
                </g>
                <path d="M145.632 584.077C145.632 380.247 221.847 263.415 361.619 263.415C501.39 263.415 577.605 380.247 577.605 584.077L556.767 646.56H166.471L145.632 584.077Z" fill="white" />
                <g id="face">
                    <path d="M274.598 406.141C269.245 406.141 264.908 410.513 264.908 415.905V432.732C264.908 438.124 269.245 442.496 274.598 442.496C279.95 442.496 284.287 438.124 284.287 432.732V415.905C284.287 410.513 279.949 406.141 274.598 406.141Z" fill="#423E4F" />
                    <path d="M448.418 406.141C443.065 406.141 438.728 410.513 438.728 415.905V432.732C438.728 438.124 443.065 442.496 448.418 442.496C453.771 442.496 458.108 438.124 458.108 432.732V415.905C458.108 410.513 453.769 406.141 448.418 406.141Z" fill="#423E4F" />
                    <path d="M401.996 433.001C396.643 433.001 392.306 437.373 392.306 442.765C381.878 453.273 371.451 442.765C361.761 433.001 352.071 442.765 341.643 453.273C331.216 442.765 321.526 433.001 311.836 442.765C311.836 459.327 341.643 472.8 381.878 472.8C411.686 459.327 411.686 442.765 401.996 433.001Z" fill="#423E4F" />
                </g>
            </g>
        </svg>
    </div>

    <div class="content">
        <h1>Frohe Ostern</h1>
        <p>Genieße die Feiertage und die<br>ersten warmen Sonnenstrahlen.</p>
    </div>

</body>
</html>
