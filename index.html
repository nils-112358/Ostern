<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Frohe Ostern</title>
    <link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@700&family=Playfair+Display:ital,wght@1,400&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #0f2b24; 
            --bunny-color: #1a3c34; /* Dunkles Grün für die Ohren */
            --text-color: #ffffff;
            --accent-pink: #ff9dd3;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Playfair Display', serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            position: relative;
        }

        /* --- Text Styling (Keine Dopplung mehr) --- */
        .content {
            position: relative;
            z-index: 50;
            text-align: center;
            pointer-events: none;
        }

        h1 {
            font-family: 'Dancing Script', cursive;
            font-size: clamp(2.5rem, 8vw, 5rem);
            margin-bottom: 10px;
            text-shadow: 0 4px 15px rgba(0,0,0,0.5);
        }

        p {
            font-size: clamp(1rem, 4vw, 1.4rem);
            font-style: italic;
            opacity: 0.9;
        }

        /* --- Der Peek-a-Boo Hase --- */
        #bunny-logic-container {
            position: absolute;
            width: 120px; /* Klein und elegant */
            height: auto;
            z-index: 10;
            opacity: 0;
            transition: all 0.6s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            pointer-events: none;
        }

        /* Ohren-Wackeln */
        .ear-anim {
            animation: earWiggle 2s ease-in-out infinite;
            transform-origin: center;
        }
        @keyframes earWiggle {
            0%, 100% { transform: rotate(0deg); }
            50% { transform: rotate(8deg); }
        }

        /* --- Positionen für den Hasen --- */
        .pos-top    { top: -110px; left: 50%; transform: translateX(-50%); }
        .show-top   { transform: translateX(-50%) translateY(140px); opacity: 1 !important; }

        .pos-bottom { bottom: -110px; left: 50%; transform: translateX(-50%); }
        .show-bottom { transform: translateX(-50%) translateY(-140px); opacity: 1 !important; }

        .pos-left   { left: -110px; top: 50%; transform: translateY(-50%) rotate(90deg); }
        .show-left  { transform: translateY(-50%) rotate(90deg) translate(140px); opacity: 1 !important; }

        .pos-right  { right: -110px; top: 50%; transform: translateY(-50%) rotate(-90deg); }
        .show-right { transform: translateY(-50%) rotate(-90deg) translate(-140px); opacity: 1 !important; }

        /* Fall-Animation */
        .fall-start { top: -150px; left: 50%; transform: translateX(-50%); opacity: 1 !important; transition: transform 3s linear !important; }
        .fall-end   { transform: translateX(-50%) translateY(120vh); }

        /* Ostereier */
        .egg {
            position: absolute;
            width: 40px; height: 55px;
            border-radius: 50% 50% 50% 50% / 60% 60% 40% 40%;
            opacity: 0.6;
            background: var(--accent-pink);
            box-shadow: inset -5px -5px 10px rgba(0,0,0,0.2);
        }
    </style>
</head>
<body>

    <div class="egg" style="top:10%; left:10%;"></div>
    <div class="egg" style="bottom:15%; right:15%; background:#a8dadc;"></div>

    <div class="content">
        <h1>Frohe Ostern</h1>
        <p>Genieße die Feiertage und die<br>ersten warmen Sonnenstrahlen.</p>
    </div>

    <div id="bunny-logic-container">
        <svg viewBox="0 0 728 914" fill="none" xmlns="http://www.w3.org/2000/svg">
            <path class="ear-anim" d="M128 175c33-24 80-17 105 16 78 106 68 218 68 218Z" fill="var(--bunny-color)" />
            <path class="ear-anim" d="M600 175c-33-24-80-17-105 16-78 106-68 218-68 218Z" fill="var(--bunny-color)" />
            <path d="M274 406c-5 0-10 4-10 10v16c0 6 5 10 10 10s10-4 10-10v-16c0-6-5-10-10-10Z" fill="#fff" />
            <path d="M448 406c-5 0-10 4-10 10v16c0 6 5 10 10 10s10-4 10-10v-16c0-6-5-10-10-10Z" fill="#fff" />
            <path d="M401 433c-5 0-10 4-10 10 0 6-5 10-10 10s-10-4-10-10c0-6-5-10-10-10s-10 4-10 10c0 6-5 10-10 10s-10-4-10-10c0-6-5-10-10-10s-10 4-10 10c0 17 14 30 30 30 8 0 15-3 20-8 5 5 12 8 20 8 17 0 30-13 30-30 0-6-4-10-10-10Z" fill="#fff" />
        </svg>
    </div>

    <script>
        const bunny = document.getElementById('bunny-logic-container');
        const types = ['top', 'bottom', 'left', 'right', 'fall'];

        function runBunny() {
            bunny.style.transition = 'all 0.6s cubic-bezier(0.175, 0.885, 0.32, 1.275)';
            bunny.className = ''; 
            const mode = types[Math.floor(Math.random() * types.length)];

            if(mode === 'fall') {
                bunny.classList.add('fall-start');
                setTimeout(() => bunny.classList.add('fall-end'), 100);
                setTimeout(runBunny, 5000);
            } else {
                bunny.classList.add('pos-' + mode);
                setTimeout(() => bunny.classList.add('show-' + mode), 100);
                setTimeout(() => {
                    bunny.style.opacity = '0';
                    setTimeout(runBunny, Math.random() * 3000 + 2000);
                }, 2500);
            }
        }
        window.onload = () => setTimeout(runBunny, 1000);
    </script>
</body>
</html>
