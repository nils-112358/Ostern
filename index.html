<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Frohe Ostern!</title>
    <link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@700&family=Playfair+Display:ital,wght@1,400&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #0f2b24; 
            --bunny-color: #f0f0f0; /* Hellgrau/Weiß für den Körper */
            --egg-pink: #ff9dd3;
            --egg-blue: #a8dadc;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Playfair Display', serif;
            background-color: var(--bg-color);
            color: #fff;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            position: relative;
        }

        .content {
            position: relative;
            z-index: 100;
            text-align: center;
            pointer-events: none;
        }

        h1 {
            font-family: 'Dancing Script', cursive;
            font-size: clamp(2.5rem, 8vw, 5rem);
            text-shadow: 0 4px 15px rgba(0,0,0,0.5);
        }

        /* --- Der Hase --- */
        #bunny-container {
            position: absolute;
            width: 220px; /* Kompakte Größe */
            height: 280px;
            z-index: 10;
            opacity: 0;
            transition: all 0.7s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            pointer-events: none;
        }

        /* Positionen */
        .pos-top    { top: -300px; left: 50%; transform: translateX(-50%); }
        .show-top   { transform: translateX(-50%) translateY(320px); opacity: 1 !important; }

        .pos-bottom { bottom: -300px; left: 50%; transform: translateX(-50%); }
        .show-bottom { transform: translateX(-50%) translateY(-220px); opacity: 1 !important; }

        /* Fall-Animation */
        .fall-start { top: -350px; left: 50%; transform: translateX(-50%); opacity: 1 !important; transition: transform 3s linear !important; }
        .fall-end   { transform: translateX(-50%) translateY(130vh); }

        /* --- Gestreifte Eier --- */
        .egg {
            position: absolute;
            width: 50px; height: 70px;
            border-radius: 50% 50% 50% 50% / 60% 60% 40% 40%;
            z-index: 5;
            box-shadow: inset -5px -5px 10px rgba(0,0,0,0.2);
            background-color: #fff;
        }

        .egg-pink {
            top: 20%; left: 15%;
            background: repeating-linear-gradient(45deg, var(--egg-pink), var(--egg-pink) 10px, #fff 10px, #fff 20px);
        }

        .egg-blue {
            bottom: 20%; right: 15%;
            background: repeating-linear-gradient(-45deg, var(--egg-blue), var(--egg-blue) 10px, #fff 10px, #fff 20px);
        }
    </style>
</head>
<body>

    <div class="egg egg-pink"></div>
    <div class="egg egg-blue"></div>

    <div class="content">
        <h1>Frohe Ostern</h1>
        <p>Genieße die Feiertage!</p>
    </div>

    <div id="bunny-container">
        <svg viewBox="0 0 728 914" xmlns="http://www.w3.org/2000/svg">
            <path d="M128 175c33-24 80-17 105 16 78 106 68 218 68 218Z" fill="var(--bunny-color)" />
            <path d="M600 175c-33-24-80-17-105 16-78 106-68 218-68 218Z" fill="var(--bunny-color)" />
            <path d="M145 584c0-204 76-321 216-321s216 117 216 321l-21 62H166l-21-62Z" fill="var(--bunny-color)" />
            <circle cx="274" cy="425" r="10" fill="#333" />
            <circle cx="448" cy="425" r="10" fill="#333" />
            <path d="M340 450q22 15 44 0" stroke="#333" stroke-width="5" fill="none" stroke-linecap="round" />
        </svg>
    </div>

    <script>
        const bunny = document.getElementById('bunny-container');
        const actions = ['top', 'bottom', 'fall'];

        function trigger() {
            bunny.style.transition = 'all 0.7s cubic-bezier(0.175, 0.885, 0.32, 1.275)';
            bunny.className = '';
            const action = actions[Math.floor(Math.random() * actions.length)];

            if (action === 'fall') {
                bunny.classList.add('fall-start');
                setTimeout(() => bunny.classList.add('fall-end'), 50);
                setTimeout(trigger, 4000);
            } else {
                bunny.classList.add('pos-' + action);
                setTimeout(() => bunny.classList.add('show-' + action), 50);
                setTimeout(() => {
                    bunny.style.opacity = '0';
                    setTimeout(trigger, Math.random() * 2000 + 1500);
                }, 2000);
            }
        }

        window.onload = trigger;
    </script>
</body>
</html>
