<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Frohe Ostern</title>
    <style>
        :root {
            --bg-color: #1a3c34; /* Dein dunkelgrüner Hintergrund */
            --text-color: #f1f1f1;
            --bunny-color: rgba(255, 255, 255, 0.9);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            text-align: center;
            padding: 20px;
            overflow: hidden; /* Verhindert Scrollbars */
            position: relative;
        }

        /* --- Text Animationen --- */
        
        .content {
            z-index: 10;
            max-width: 600px;
        }

        .animated-text {
            opacity: 0;
            transform: translateY(20px);
            animation: fadeSlideUp 0.8s ease-out forwards;
        }

        h1 {
            font-weight: 300;
            font-size: 3.5rem;
            letter-spacing: 3px;
            margin-bottom: 20px;
            color: var(--text-color);
            animation-delay: 0.2s; /* Startet kurz nach dem Laden */
        }

        p {
            line-height: 1.6;
            font-size: 1.3rem;
            color: #ccc;
            margin-bottom: 40px;
            animation-delay: 0.6s; /* Startet nach der Überschrift */
        }

        @keyframes fadeSlideUp {
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* --- Der RIESIGE Hase (SVG) --- */
        
        .easter-bunny-svg {
            position: absolute;
            bottom: -150px; /* Lugt massiv herein */
            right: -80px;
            width: 450px;  /* VIEL größer */
            height: auto;
            opacity: 0.9;
            z-index: 1;
        }

        /* Hasen-Wackel-Animation */
        #rightEar, #leftEar, #face {
            animation: earWiggle 2.5s linear infinite;
            transform-origin: center;
        }

        @keyframes earWiggle {
            0%, 20%, 50%, 80%, 100% { transform: translateY(0); }
            40% { transform: translateY(-15px); }
            60% { transform: translateY(-8px); }
        }

        /* --- Bunte Ostereier --- */
        
        .egg {
            position: absolute;
            width: 50px;
            height: 70px;
            border-radius: 50% 50% 50% 50% / 60% 60% 40% 40%;
            opacity: 0.8;
            z-index: 2;
            animation: eggFloat 4s ease-in-out infinite;
        }

        /* Verschiedene Farben und Positionen */
        .egg-1 { background-color: #ff9999; top: 15%; left: 10%; animation-delay: 0s; } /* Pastellrot */
        .egg-2 { background-color: #99ff99; top: 70%; left: 15%; animation-delay: 1s; width: 40px; height: 55px; } /* Pastellgrün */
        .egg-3 { background-color: #9999ff; top: 25%; right: 15%; animation-delay: 2s; } /* Pastellblau */
        .egg-4 { background-color: #ffff99; top: 60%; right: 25%; animation-delay: 0.5s; width: 60px; height: 85px; } /* Pastellgelb */
        .egg-5 { background-color: #ff99ff; top: 80%; left: 40%; animation-delay: 1.5s; } /* Pastellpink */

        @keyframes eggFloat {
            0%, 100% { transform: translateY(0) rotate(0deg); }
            50% { transform: translateY(-15px) rotate(5deg); }
        }

        /* Responsive Anpassung für Mobilgeräte */
        @media (max-width: 600px) {
            h1 { font-size: 2.2rem; }
            p { font-size: 1.1rem; }
            .easter-bunny-svg { width: 280px; bottom: -80px; right: -40px; }
            .egg { width: 35px; height: 50px; }
            .egg-4 { width: 45px; height: 65px; }
        }
    </style>
</head>
<body>

    <div class="egg egg-1"></div>
    <div class="egg egg-2"></div>
    <div class="egg egg-3"></div>
    <div class="egg egg-4"></div>
    <div class="egg egg-5"></div>

    <svg class="easter-bunny-svg" viewBox="0 0 728 914" fill="none" xmlns="http://www.w3.org/2000/svg">

                <g id="leftEar">
                    <path d="M128.977 175.833C161.935 151.115 208.536 157.998 233.067 191.206C311.87 297.883 301.251 409.044 301.251 409.044C301.251 409.044 192.523 387.391 113.72 280.714C89.1897 247.506 96.0204 200.549 128.977 175.833V175.833Z" fill="#FF9DD3" />
                </g>
                <g id="rightEar">

                </g>

                <g id="face">
                    <g id="eyes">

                        <path d="M448.418 406.141C443.065 406.141 438.728 410.513 438.728 415.905V432.732C438.728 438.124 443.065 442.496 448.418 442.496C453.771 442.496 458.108 438.124 458.108 432.732V415.905C458.108 410.513 453.769 406.141 448.418 406.141Z" fill="#423E4F" />
                    </g>
                    <path d="M401.996 433.001C396.643 433.001 392.306 437.373 392.306 442.765C392.306 448.559 387.628 453.273 381.878 453.273C376.129 453.273 371.451 448.559 371.451 442.765C371.451 437.373 367.114 433.001 361.761 433.001C356.408 433.001 352.071 437.373 352.071 442.765C352.071 448.559 347.393 453.273 341.643 453.273C335.894 453.273 331.216 448.559 331.216 442.765C331.216 437.373 326.879 433.001 321.526 433.001C316.173 433.001 311.836 437.373 311.836 442.765C311.836 459.327 325.208 472.8 341.643 472.8C349.39 472.8 356.455 469.805 361.761 464.906C367.067 469.805 374.132 472.8 381.878 472.8C398.315 472.8 411.686 459.327 411.686 442.765C411.686 437.373 407.348 433.001 401.996 433.001Z" fill="#423E4F" />
                </g>
            </g>
        </g>
    </svg>

    <div class="content">
        <h1 class="animated-text">Frohe Ostern</h1>
        <p class="animated-text">
            Ich wünsche dir eine erholsame Zeit,<br>
            viele bunte Momente und einen<br>
            fleißigen Osterhasen.
        </p>
    </div>

</body>
</html>
