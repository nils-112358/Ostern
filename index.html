<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Frohe Ostern</title>
    <style>
        :root {
            /* Neuer dunkelgrüner Hintergrund */
            --bg-color: #1a3c34; 
            /* Ein sanfterer Akzent für dunkle Hintergründe */
            --accent-color: #a8dadc;
            /* Text ist jetzt hellgrau/weiß für guten Kontrast */
            --text-color: #f1f1f1;
            /* Container-Hintergrund leicht transparent */
            --container-bg: rgba(255, 255, 255, 0.05);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            text-align: center;
            padding: 20px;
            overflow: hidden; /* Verhindert Scrollbars durch die Animation */
        }

        .container {
            max-width: 500px;
            padding: 40px;
            background: var(--container-bg);
            border-radius: 30px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
            border: 1px solid rgba(255, 255, 255, 0.1);
            position: relative;
            z-index: 10; /* Text über dem Hasen */
        }

        /* Styling für den Hasen (SVG) */
        .easter-bunny-svg {
            position: absolute;
            bottom: -50px; /* Positioniert den Hasen am unteren Rand */
            right: -20px;
            width: 150px;  /* Größe angepasst */
            height: auto;
            opacity: 0.8;
            z-index: 1;    /* Hinter dem Text-Container */
        }

        /* Wackel-Animation für den Hasen */
        #rightEar,
        #leftEar,
        #face {
            animation: ear 2s linear infinite;
            transform-origin: center;
        }

        @keyframes ear {
            0%, 20%, 50%, 80%, 100% {
                transform: translateY(0);
            }
            40% {
                transform: translateY(-10px); /* Leicht nach oben */
            }
            60% {
                transform: translateY(-5px);
            }
        }

        h1 {
            font-weight: 300;
            font-size: 2.5rem;
            margin-bottom: 15px;
            letter-spacing: 2px;
            color: var(--text-color);
        }

        p {
            line-height: 1.6;
            font-size: 1.1rem;
            color: #ccc; /* Etwas dunklerer Text für den Inhalt */
            margin-bottom: 30px;
        }

        .divider {
            height: 2px;
            width: 50px;
            background-color: var(--accent-color);
            margin: 20px auto;
        }

        .button {
            display: inline-block;
            padding: 12px 30px;
            background-color: #457b9d; /* Kräftigeres Blau für den Button auf Grün */
            color: white;
            text-decoration: none;
            border-radius: 50px;
            transition: transform 0.3s ease, background-color 0.3s ease;
            font-weight: 600;
        }

        .button:hover {
            background-color: var(--accent-color);
            transform: translateY(-2px);
            color: #333;
        }

        /* Responsive Anpassung */
        @media (max-width: 480px) {
            h1 { font-size: 1.8rem; }
            .container { padding: 25px; }
            .easter-bunny-svg { width: 100px; bottom: -30px; right: -10px; }
        }
    </style>
</head>

        <h1>Frohe Ostern</h1>
        <div class="divider"></div>
        <p>
            Ich wünsche dir eine erholsame Zeit, <br>
